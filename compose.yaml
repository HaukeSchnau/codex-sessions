services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codex_archive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-codex_archive}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30

  archive-server:
    image: codex-sessions-archive-server:nix
    pull_policy: never
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-codex_archive}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-codex_archive}
      ARCHIVE_INGEST_TOKEN: ${ARCHIVE_INGEST_TOKEN}
      ARCHIVE_READ_TOKEN: ${ARCHIVE_READ_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      ARCHIVE_MAX_INGEST_BODY_BYTES: ${ARCHIVE_MAX_INGEST_BODY_BYTES:-67108864}
      BIND_ADDR: 0.0.0.0:8787
      RUST_LOG: ${RUST_LOG:-archive_server=info,tower_http=info}
    ports:
      - "${ARCHIVE_SERVER_PORT:-8787}:8787"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8787/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  postgres-data:
